name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile --name "HeyGenControl_Win" `
          --icon "heygen-logo.ico" `
          --add-data "styles.py;." `
          --add-data "browser.py;." `
          --add-data "ui_components.py;." `
          --add-data "heygen-logo.ico;." `
          --collect-all PyQt6.QtWebEngineCore `
          --collect-all PyQt6.QtWebEngineWidgets `
          main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconsole --onefile --name "HeyGenControl_Linux" \
          --add-data "styles.py:." \
          --add-data "browser.py:." \
          --add-data "ui_components.py:." \
          --add-data "heygen-logo.ico:." \
          --collect-all PyQt6.QtWebEngineCore \
          --collect-all PyQt6.QtWebEngineWidgets \
          main.py
          chmod +x dist/HeyGenControl_Linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-builds
          pattern: build-*
          merge-multiple: true # 关键：将所有平台的产物合并到同一个文件夹

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用通配符自动抓取合并文件夹下的所有打包文件
          files: |
            all-builds/HeyGenControl_Win.exe
            all-builds/HeyGenControl_Linux
            HeyGenControl.desktop
            heygen-logo.ico
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
