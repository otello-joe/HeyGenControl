name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0, v1.1 等标签时触发

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 即使一个平台失败，另一个平台也继续打包
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --name "HeyGenControl_v1.0_Win" `
          --add-data "styles.py;." `
          --add-data "browser.py;." `
          --add-data "ui_components.py;." `
          --collect-all PyQt6.QtWebEngineCore `
          --collect-all PyQt6.QtWebEngineWidgets `
          main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconsole --name "HeyGenControl_v1.0_Linux" \
          --add-data "styles.py:." \
          --add-data "browser.py:." \
          --add-data "ui_components.py:." \
          --collect-all PyQt6.QtWebEngineCore \
          --collect-all PyQt6.QtWebEngineWidgets \
          main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4 # 【核心修复：升级到 v4】
        with:
          name: build-artifacts-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 确保有权限创建 Release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4 # 【核心修复：升级到 v4】
        with:
          path: all-builds
          pattern: build-artifacts-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2 # 升级到 v2
        with:
          files: |
            all-builds/HeyGenControl_v1.0_Win.exe
            all-builds/HeyGenControl_v1.0_Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
