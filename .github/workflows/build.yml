name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-WebEngine pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # 核心修改：去掉了 --onefile，改用默认的目录模式
          pyinstaller --noconsole --name "HeyGenControl_Win" `
          --icon "heygen-logo.ico" `
          --add-data "styles.py;." `
          --add-data "browser.py;." `
          --add-data "ui_components.py;." `
          --add-data "heygen-logo.ico;." `
          --collect-all PyQt6.QtWebEngineCore `
          --collect-all PyQt6.QtWebEngineWidgets `
          main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconsole --name "HeyGenControl_Linux" \
          --add-data "styles.py:." \
          --add-data "browser.py:." \
          --add-data "ui_components.py:." \
          --add-data "heygen-logo.ico:." \
          --collect-all PyQt6.QtWebEngineCore \
          --collect-all PyQt6.QtWebEngineWidgets \
          main.py

      # 将生成的文件夹压缩，方便下载
      - name: Zip Build (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist/HeyGenControl_Win -DestinationPath dist/HeyGenControl_Win.zip

      - name: Zip Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: zip -r dist/HeyGenControl_Linux.zip dist/HeyGenControl_Linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-builds
          pattern: build-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-builds/HeyGenControl_Win.zip
            all-builds/HeyGenControl_Linux.zip
            HeyGenControl.desktop
            heygen-logo.ico
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
